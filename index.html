<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Sign up form</title>
    <link rel="stylesheet" href="style.css">
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Nunito:ital,wght@0,200..1000;1,200..1000&display=swap" rel="stylesheet">
</head>
<body>
    <div class="background">
        <div class="logo-container">
            <img src="assets/photo/odin-logo.png" alt="The Odin Project">
             <h1 aria-hidden="true">ODIN</h1>
        </div>
        <p>Background by 
            <a href="https://unsplash.com/@aldebarans">
                Aldebarans on Unsplash
            </a>
        </p>
    </div>

    <div class="main">
        <div class="introduction">
            <p>
                This is not a real online service! You know you need something
                like this in your life to help you realize your deepest dreams. <br>
                Sign up <em>now</em> to get started.
            </p>
            <p>You <em>know</em> you want to.</p>
        </div>
        <form action="" id="sign-up-form">
            <p>Let's do this!</p>

            <div class="form-item-container">
                <div class="form-item">
                    <label for="first-name">First name</label>
                        <input
                            type="text"
                            id="first-name"
                            name="first-name"
                        >
                </div>
                <div class="form-item">
                    <label for="last-name">Last name</label>
                    <input
                        type="text"
                        id="last-name"
                        name="last-name"
                    >
                </div>
                <div class="form-item">
                    <label for="email">Email</label>
                    <input
                        type="email"
                        id="email"
                        name="email"
                        placeholder="abc@example.com"
                    >
                </div>
                <div class="form-item">
                    <label for="phone-number">Phone number</label>
                    <input
                        type="tel"
                        id="phone-number"
                        name="phone-number"
                    >
                </div>
                <div class="form-item">
                    <label for="password">Password</label>
                    <input 
                        type="password"
                        id="password"
                        name="password"
                        required
                    >
                </div>
                <div class="form-item">
                    <label for="confirm-password">Confirm password</label>
                    <input 
                        type="password"
                        id="confirm-password"
                        name="confirm-password"
                        required
                    >
                </div>
            </div>
        </form>
        <button type="submit" form="sign-up-form">
            Create Account
        </button>
        <p>Already have an account? <span>Log in</span></p>
    </div>
</body>
</html>
